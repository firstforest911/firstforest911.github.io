<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初林官方导航页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 400;
        }

        .contact-section {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .contact-section:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .contact-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .email-display {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .email-icon {
            font-size: 18px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 18px 24px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .link-button:hover::before {
            left: 100%;
        }

        .link-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .link-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: transform 0.3s ease;
        }

        .link-button:hover .link-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .link-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .link-title {
            font-size: 16px;
            font-weight: 600;
        }

        .link-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .arrow {
            font-size: 20px;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .link-button:hover .arrow {
            opacity: 1;
            transform: translateX(5px);
        }

        /* QQ群特殊样式 */
        .link-button.qq-group {
            background: linear-gradient(135deg, rgba(18, 183, 245, 0.2), rgba(18, 183, 245, 0.1));
            border-color: rgba(18, 183, 245, 0.3);
        }

        .link-button.qq-group:hover {
            background: linear-gradient(135deg, rgba(18, 183, 245, 0.3), rgba(18, 183, 245, 0.2));
            box-shadow: 0 10px 30px rgba(18, 183, 245, 0.3);
        }

        .link-button.qq-group .link-icon {
            background: rgba(18, 183, 245, 0.25);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
<base target="_blank">
</head>
<body oncontextmenu="return false" onkeydown="return blockKeys(event)" onload="initProtect()">
    <div class="glass-card">
        <div class="header">
            <div class="avatar">🌲</div>
            <h1>初林官方</h1>
            <div class="subtitle">First Forest Official</div>
        </div>

        <div class="contact-section">
            <div class="contact-label">联系我们</div>
            <div class="email-display">
                <span class="email-icon">✉️</span>
                <span>firstforest@qwyhgf.com</span>
            </div>
        </div>

        <div class="links-container">
            <a href="https://qm.qq.com/q/5e3uW3MXgI" class="link-button qq-group" target="_blank">
                <div class="link-content">
                    <div class="link-icon">👥</div>
                    <div class="link-text">
                        <span class="link-title">官方交流群</span>
                        <span class="link-desc">QQ群即时沟通 · 点击加入</span>
                    </div>
                </div>
                <span class="arrow">→</span>
            </a>
            <a href="https://link3.cc/firstforest" class="link-button" target="_blank">
                <div class="link-content">
                     <div class="link-icon">📚</div>
                     <div class="link-text">
                         <span class="link-title">初林网课</span>
                         <span class="link-desc">优质网课资源</span>
                    </div>
                </div>
                <span class="arrow">→</span>
            </a>
            
        </div>

        <div class="footer">
            © 2026 初林官方 · 保留所有权利
        </div>
    </div>

    <script>
        // 1. 禁用右键菜单
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 2. 禁用查看源码的快捷键
        function blockKeys(e) {
            // 禁用F12（开发者工具）
            if (e.keyCode === 123) return false;
            // 禁用Ctrl+U（查看页面源码）
            if (e.ctrlKey && e.keyCode === 85) return false;
            // 禁用Ctrl+Shift+I（开发者工具）
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) return false;
            // 禁用Ctrl+Shift+J（开发者工具控制台）
            if (e.ctrlKey && e.shiftKey && e.keyCode === 74) return false;
            // 禁用Ctrl+Shift+C（选取元素）
            if (e.ctrlKey && e.shiftKey && e.keyCode === 67) return false;
            // 禁用Alt+V（部分浏览器的查看菜单）
            if (e.altKey && e.keyCode === 86) return false;
            return true;
        }

        // 3. 检测开发者工具并干扰
        function initProtect() {
            // 检测开发者工具是否打开
            const devtoolsDetector = () => {
                const threshold = 160;
                const width = window.outerWidth - window.innerWidth > threshold;
                const height = window.outerHeight - window.innerHeight > threshold;
                
                if (width || height) {
                    // 开发者工具打开时的干扰措施
                    document.body.style.display = 'none';
                    alert('检测到非法调试行为，页面已暂停显示！');
                    // 刷新页面（可选）
                    // location.reload();
                } else {
                    document.body.style.display = 'flex';
                }
            };

            // 定时检测
            setInterval(devtoolsDetector, 1000);
            
            // 额外防护：禁止复制文本
            document.addEventListener('copy', e => {
                e.preventDefault();
                alert('禁止复制页面内容！');
            });

            // 4. 混淆DOM结构（简单版）
            const obfuscateDOM = () => {
                // 给关键元素添加随机属性，干扰源码阅读
                const elements = document.querySelectorAll('div, a, span, h1');
                elements.forEach(el => {
                    const randomAttr = 'data-' + Math.random().toString(36).substr(2, 9);
                    el.setAttribute(randomAttr, Math.random().toString(36));
                });
            };
            
            obfuscateDOM();
        }
    </script>
</body>
</html>
